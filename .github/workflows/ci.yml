name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Client build.rs needs curl to download CJK font
      - name: Check workspace
        run: cargo check --workspace --exclude spike-packet

      - name: Run tests
        run: cargo test --workspace --exclude spike-packet

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude spike-packet -- -D warnings

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true

  build-client:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2

      - name: Build client (release)
        run: cargo build --release --package war3-client

      - name: Upload client binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/war3-client.exe

  build-server:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build server (release)
        run: cargo build --release --package war3-server

      - name: Upload server binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/war3-server

name: "測試基礎設施 (Test Infrastructure)"
description: "記錄測試覆蓋缺口與測試工具建設"
labels: ["type:test-infra"]
body:
  - type: markdown
    attributes:
      value: |
        > 定義與分類標準見 [quality/README.md](quality/README.md#分類體系)。
  - type: input
    id: title
    attributes:
      label: "TL;DR"
      placeholder: "API 端點缺少整合測試，只有手動驗證"
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: "優先級"
      options:
        - "Critical — 立即處理（同日）"
        - "High — 下個 Sprint（1-2 週）"
        - "Medium — 規劃中（1 個月）"
        - "Low — 有空時處理"
    validations:
      required: true
  - type: dropdown
    id: cost
    attributes:
      label: "預估成本"
      options:
        - "S — < 2 小時"
        - "M — 2 小時 ~ 1 天"
        - "L — 1 ~ 3 天"
        - "XL — > 3 天"
  - type: input
    id: coverage-gap
    attributes:
      label: "覆蓋缺口"
      description: "缺少什麼測試覆蓋？"
      placeholder: "POST /api/items 缺少邊界條件測試（空字串、超長輸入）"
    validations:
      required: true
  - type: input
    id: planned-resolution
    attributes:
      label: "預計解決時機"
      placeholder: "下個 Sprint / Phase 2 完成後 / 無時程"
  - type: textarea
    id: current-state
    attributes:
      label: "現狀描述"
    validations:
      required: true
  - type: textarea
    id: affected-files
    attributes:
      label: "受影響檔案"
  - type: textarea
    id: solution
    attributes:
      label: "解決方案"
  - type: textarea
    id: acceptance
    attributes:
      label: "驗收標準"

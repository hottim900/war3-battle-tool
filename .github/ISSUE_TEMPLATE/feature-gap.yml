name: "功能缺口 (Feature Gap)"
description: "記錄功能不完整 — 缺少預期互動"
labels: ["type:feature-gap"]
body:
  - type: markdown
    attributes:
      value: |
        > 定義與分類標準見 [quality/README.md](quality/README.md#分類體系)。
  - type: input
    id: title
    attributes:
      label: "TL;DR"
      placeholder: "搜尋結果沒有分頁，超過 100 筆時無法瀏覽"
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: "優先級"
      options:
        - "Critical — 立即處理（同日）"
        - "High — 下個 Sprint（1-2 週）"
        - "Medium — 規劃中（1 個月）"
        - "Low — 有空時處理"
    validations:
      required: true
  - type: dropdown
    id: cost
    attributes:
      label: "預估成本"
      options:
        - "S — < 2 小時"
        - "M — 2 小時 ~ 1 天"
        - "L — 1 ~ 3 天"
        - "XL — > 3 天"
  - type: input
    id: user-impact
    attributes:
      label: "使用者影響"
      description: "缺少此功能對使用者造成什麼問題？"
      placeholder: "使用者無法找到歷史資料，需手動逐頁查看"
    validations:
      required: true
  - type: textarea
    id: current-state
    attributes:
      label: "現狀描述"
    validations:
      required: true
  - type: textarea
    id: affected-files
    attributes:
      label: "受影響檔案"
  - type: textarea
    id: solution
    attributes:
      label: "解決方案"
  - type: textarea
    id: acceptance
    attributes:
      label: "驗收標準"
